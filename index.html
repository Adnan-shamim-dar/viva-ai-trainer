<!DOCTYPE html>
<html>

<head>

<title>AI Medical Viva Trainer</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-xl shadow-xl w-[500px]">

<h1 class="text-3xl font-bold text-center mb-6">
AI Medical Viva Trainer
</h1>

<div class="mb-6">

<label class="font-semibold">Subject</label>

<select class="border p-2 w-full rounded mt-2">

<option>Physiology</option>
<option>Pathology</option>
<option>Pharmacology</option>

</select>

</div>

<button onclick="askQuestion()" 
class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded w-full">

Start Viva

</button>

<div class="mt-6">

<p class="font-semibold mb-2">Professor Question:</p>

<p id="question" class="text-lg text-gray-700"></p>

<textarea 
id="answer"
placeholder="Type your answer here..."
class="border p-3 w-full rounded mt-4 h-32"></textarea>

<button onclick="submitAnswer()" 
class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded w-full mt-3">

Submit Answer

</button>
<button onclick="followUp()" 
class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 px-4 rounded w-full mt-3">

Follow-Up Question

</button>
<p id="feedback" class="mt-4 text-gray-800"></p>

</div>

</div>

<script>

async function askQuestion(){

const response = await fetch("/question")

const data = await response.json()

document.getElementById("question").innerText = data.question
const speech = new SpeechSynthesisUtterance(data.question)
speech.rate = 0.9
speech.pitch = 1
speech.volume = 1

speechSynthesis.speak(speech)
}

async function submitAnswer(){

const answer = document.getElementById("answer").value

const response = await fetch("/evaluate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({answer:answer})

})

const data = await response.json()

document.getElementById("feedback").innerText = data.feedback

}
async function followUp(){

const followUps = [
"Can you explain the mechanism behind that?",
"What ion channels are involved?",
"What happens if that mechanism fails?",
"Can you give a clinical example?",
"Which Starling force pulls fluid back into the capillary?"
]

const q = followUps[Math.floor(Math.random()*followUps.length)]

document.getElementById("question").innerText = q

const speech = new SpeechSynthesisUtterance(q)
speech.rate = 0.9

speechSynthesis.speak(speech)
}
</script>

</body>
